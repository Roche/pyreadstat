# requires pytest-mypy-plugins
# command to run: pytest tests/test_typing.yml --mypy-ini-file=tests/test_mypy_setup.ini

# yaml-language-server: $schema=https://raw.githubusercontent.com/typeddjango/pytest-mypy-plugins/master/pytest_mypy_plugins/schema.json

- case: read_sav_default_types
  main: |
    from pyreadstat import read_sav
    df, meta = read_sav("file.sav")
    reveal_type(df)  # N: Revealed type is "pandas.core.frame.DataFrame"
    reveal_type(meta)  # N: Revealed type is "pyreadstat.pyclasses.metadata_container"

- case: read_sav_output_types
  parametrized:
    - output_format: "pandas"
      expected_type: "pandas.core.frame.DataFrame"
    - output_format: "polars"
      expected_type: "polars.dataframe.frame.DataFrame"
    - output_format: "dict"
      expected_type: "builtins.dict[builtins.str, numpy.ndarray[builtins.tuple[Any, ...], numpy.dtype[numpy.generic[Any]]]]"
  main: |
    from pyreadstat import read_sav
    df: object
    df, meta = read_sav("file.sav", output_format="{{ output_format }}")
    reveal_type(df)  # N: Revealed type is "{{ expected_type }}"

- case: read_sav_buffer_types
  main: |
    import io
    from pyreadstat import read_sav
    buffer = io.BytesIO()
    df, meta = read_sav(buffer)

