- case: read_file_multiprocessing_default_types
  main: |
    from pyreadstat import read_file_multiprocessing, read_sav
    df, meta = read_file_multiprocessing(read_sav, "file.sav", metadataonly=True)
    reveal_type(df)  # N: Revealed type is "pandas.core.frame.DataFrame"
    reveal_type(meta)  # N: Revealed type is "pyreadstat.pyclasses.metadata_container"

- case: read_file_multiprocessing_output_types
  parametrized:
    - output_format: "pandas"
      expected_type: "pandas.core.frame.DataFrame"
    - output_format: "polars"
      expected_type: "polars.dataframe.frame.DataFrame"
    - output_format: "dict"
      expected_type: "builtins.dict[builtins.str, numpy.ndarray[builtins.tuple[Any, ...], numpy.dtype[numpy.generic[Any]]]]"
  main: |
    from pyreadstat import read_file_multiprocessing, read_sav
    df, meta = read_file_multiprocessing(read_sav, "file.sav", metadataonly=True, output_format="{{ output_format }}")
    reveal_type(df)  # N: Revealed type is "{{ expected_type }}"

- case: read_file_multiprocessing_invalid_callable
  main: |
    from pyreadstat import read_file_multiprocessing
    def noop(a: int) -> int:
        return a
    read_file_multiprocessing(noop, "file.sav", 1, 1)  # E: Argument 1 to "read_file_multiprocessing" has incompatible type "Callable[[int], int]"; expected "def (str | bytes | PathLike[str] | PathLike[bytes] | FileLike, /, *Any, **Any) -> tuple[pandas.core.frame.DataFrame | polars.dataframe.frame.DataFrame | dict[str, ndarray[tuple[Any, ...], dtype[generic[Any]]]], metadata_container]"  [arg-type]
  out: |
    main:4: note: This is likely because "noop" has named arguments: "a". Consider marking them positional-only

