- case: set_value_labels_types
  parametrized:
    - backend: "pandas"
      expected_value: "pandas.core.frame.DataFrame"
    - backend: "polars"
      expected_value: "polars.dataframe.frame.DataFrame"
  main: |
    import {{ backend }}
    from pyreadstat import set_value_labels, metadata_container
    df = {{ backend }}.DataFrame()
    metadata = metadata_container()
    df = set_value_labels(df, metadata)
    reveal_type(df)  # N: Revealed type is "{{ expected_value }}"

