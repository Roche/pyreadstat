- case: worker_types
  main: |
    from pyreadstat import read_sav
    from pyreadstat.worker import Input, worker
    inpt: Input = (read_sav, "test_data/file.sav", 0, 100, {})
    result = worker(inpt)
    reveal_type(result)  # N: Revealed type is "pandas.core.frame.DataFrame | polars.dataframe.frame.DataFrame | builtins.dict[builtins.str, numpy.ndarray[builtins.tuple[Any, ...], numpy.dtype[Any]]]"
    inpt_invalid: Input = (lambda x: "A", "test_data/file.sav", 0, 100, {})  # ER: Incompatible types in assignment (expression has type "tuple[Callable[[Any], str], str, int, int, dict[str, Any]]", variable has type "tuple[def (str | bytes | PathLike[str] | PathLike[bytes] | FileLike, /, *Any, **Any) -> tuple[pandas.core.frame.DataFrame | polars.dataframe.frame.DataFrame | dict[str, ndarray[tuple[Any, ...], dtype[generic[Any]]]], metadata_container], str | bytes | PathLike[Any] | FileLike, int, int, dict[str, Any]]")  [assignment]
  out: |
    main:6: error: Cannot infer type of lambda  [misc]

- case: metadata_container_types
  main: |
    from pyreadstat.pyclasses import metadata_container
    meta = metadata_container()
    meta.missing_ranges = {
        "var1": [1, 5],
        "var2": [{"hi": 1.0, "lo": 0.0}],
        "var3": ["a", "b"],
        "var4": {1, 2, 3},  # E: Dict entry 3 has incompatible type "str": "set[int]"; expected "str": "list[int | float | str | MissingRange]"  [dict-item]
    }
    meta.mr_sets = {
        "set1": {
            "type": "D",
            "is_dichotomy": True,
            "counted_value": 1,
            "label": "Set 1",
            "variable_list": ["var1", "var2"],
        },
        "set2": {
            "type": "C",
            "is_dichotomy": False,
            "counted_value": None,
            "label": "Set 2",
            "variable_list": ["var3"],
        },
        "set3": {}  # E: Missing keys ("type", "is_dichotomy", "counted_value", "label", "variable_list") for TypedDict "MRSet"  [typeddict-item]
    }
    meta.variable_measure = {
        "var1": "nominal",
        "var2": "ordinal",
        "var3": "scale",
        "var4": "unknown",
        "var5": "another",  # E: Dict entry 4 has incompatible type "str": "Literal['another']"; expected "str": "Literal['nominal', 'ordinal', 'scale', 'unknown']"  [dict-item]
    }
